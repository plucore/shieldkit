name: Process scan triggers

# Drains pending_scan_triggers one merchant per invocation. After v4
# (2026-05-28) the only trigger type that does real work is `enrichment`
# (per-product GTIN/MPN/brand metafield writes, enqueued by the
# products/update webhook). Vercel Hobby tier disallows sub-daily crons,
# so sub-daily polling lives in GitHub Actions instead; Vercel Cron daily
# 12:00 UTC is the safety net.
#
# Manual setup: add CRON_SECRET to the repo's Actions secrets (must match
# the value set on Vercel for the same env var).
#
# Security note: this workflow does not consume any user-controlled GitHub
# event payloads. The only injected value is `secrets.CRON_SECRET`, passed
# via `env:` and quoted in the curl invocation.

on:
  schedule:
    # Every 6 hours. GitHub Actions cron is best-effort and can drift /
    # skip under load — acceptable because pending_scan_triggers rows are
    # 24h-deduped at the webhook layer, so a missed tick is picked up on
    # the next run. Cadence was */5 → */30 → 0 */6 (this change, 2026-05-28)
    # to cut Vercel Hobby Fluid Active CPU. After v4 the only trigger that
    # does real work is `enrichment` (per-product GTIN/MPN/brand metafield
    # writes), so the queue is usually empty between bursts. Revert toward
    # */30 here if enrichment latency starts hurting catalog freshness.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: process-scan-triggers
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST /api/cron/process-scan-triggers
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set. Add it under Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi
          HTTP_STATUS=$(curl --silent --show-error --output /tmp/response.json --write-out "%{http_code}" \
            --max-time 90 \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            --header "Content-Type: application/json" \
            "https://shieldkit.vercel.app/api/cron/process-scan-triggers")
          echo "HTTP $HTTP_STATUS"
          cat /tmp/response.json || true
          echo
          if [ "$HTTP_STATUS" -ge 400 ]; then
            exit 1
          fi
