# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "071fc51ee1ef7f358cdaed5f95922498"
name = "ShieldKit"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[webhooks.privacy_compliance]
customer_data_request_url = "/webhooks/customers/data_request"
customer_deletion_url = "/webhooks/customers/redact"
shop_deletion_url = "/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_content,read_legal_policies"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

# [product.metafields] and [metaobjects] template boilerplate removed.
# ShieldKit is a read-only compliance scanner and does not define or mutate
# product metafields or metaobject definitions.
